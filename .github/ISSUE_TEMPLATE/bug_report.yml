name: Bug report
description: Report a reproducible bug in CosmoEdge.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove secrets, device SN values, customer names, private IPs, and private model links before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - x86 Docker runtime
        - Sophon package build
        - Backend service
        - Frontend web console
        - API / MQTT / WebSocket
        - Model import / model runtime
        - Media / streaming
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, hardware, branch/commit, and build path.
      placeholder: |
        OS:
        Docker:
        Hardware:
        Branch/commit:
        Build path: x86 Docker / Sophon package / other
    validations:
      required: true
  - type: input
    id: baseline
    attributes:
      label: Baseline commit
      description: Commit or tag used to establish whether this is a regression.
      placeholder: Commit SHA, tag, or unknown with an explanation
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: State what is in scope and explicitly out of scope for this issue.
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risk tags and affected paths
      description: Identify runtime, thread, memory, API, media, frontend, device, packaging, or compatibility risks.
      placeholder: |
        Risk tags:
        Affected paths:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact commands or UI steps.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: initial_analysis
    attributes:
      label: Initial root-cause analysis
      description: Optional at issue creation; update it before implementation when the root cause becomes known.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance checks
      description: List objective checks that must pass before this issue can be closed.
      placeholder: |
        - [ ] Parent baseline recorded
        - [ ] Focused regression test passes
        - [ ] Required build and device checks pass
        - [ ] Temporary data and rollback state audited
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs after redacting sensitive information.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I removed secrets, private IPs, device SN values, and customer data.
          required: true
