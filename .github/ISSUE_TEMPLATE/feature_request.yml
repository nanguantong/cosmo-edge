name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the user problem first so maintainers can evaluate the fit.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend service
        - Frontend web console
        - Pipeline / scenario configuration
        - Model import / model runtime
        - API / MQTT / WebSocket
        - Build / deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, diagrams, or references if useful. Remove sensitive information before submitting.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: I am willing to help test or review this feature.
          required: false
