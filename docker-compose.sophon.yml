services:
  cosmo-sophon-package:
    image: ghcr.io/cosmo-wander-ai/cosmo_edge-build-env_sophon:v1
    container_name: cosmo-sophon-package
    volumes:
      - .:/workspace
      - ./build_output:/build_output
    working_dir: /workspace
    command: >
      bash -lc "
      set -e;
      echo 'Starting cross-compilation...';
      ./scripts/build.sh -T -m data/resource/aiboxresource;
      mkdir -p /build_output;
      cp -f build/packages/* /build_output/ 2>/dev/null || echo 'Warning: No packages found to copy.';
      ls -lh /build_output;
      echo 'Build finished.'
      "
