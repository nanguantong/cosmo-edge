
upstream mvit {
    server 127.0.0.1:8000;
}

upstream mvws {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name localhost;
    #root /appfs/cosmo_wander/cwai_data/web/dist/;
    #index index.html;

    #location / {
    #    try_files $uri $uri/ /index.html last;
    #}

    location / {
        root   /appfs/cosmo_wander/cwai_data/web/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET,POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    }

    location /staticfile {
        alias /appfs/cosmo_wander/cwai_data/web/staticfile;
    }


    location ~* ^/gtw/cwai/ {
        client_max_body_size 1024m;
        # 大文件/分片上传：避免 nginx 将请求体落盘到默认 client_body_temp_path 导致 500
        # 需要确保该目录存在且可写（建议放在持久盘而不是 /tmp tmpfs）
        client_body_temp_path /data/cwaiuserdata/tmp/nginx_body 1 2;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://mvit;
        proxy_read_timeout 3600s;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X_Real_IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location ~* ^/v1/cwai/aihost/ {
        client_max_body_size 1024m;
        client_body_temp_path /data/cwaiuserdata/tmp/nginx_body 1 2;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_pass http://mvit;
        proxy_read_timeout 3600s;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X_Real_IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /event {
        # Disable cache
        add_header Cache-Control no-cache;

        # CORS setup
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length';

        # nginx 不支持 if else 也不支持 if 嵌套
        set $switchMp4 0;
        if ($request_uri ~* ".mp4") {
           add_header 'Content-Type' 'video/mp4';
           set $switchMp4 1;
        }
        if ($switchMp4 != 1) {
            add_header 'Content-Type' 'text/plain charset=UTF-8';
        }

        # allow CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        error_page 404 = /staticfile/404.jpg;

        alias /data/cwaiuserdata/event;
    }

    location /web {
        # Disable cache
        add_header Cache-Control no-cache;

        # CORS setup
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length';

        # nginx 不支持 if else 也不支持 if 嵌套
        set $switchMp4 0;
        if ($request_uri ~* ".mp4") {
           add_header 'Content-Type' 'video/mp4';
           set $switchMp4 1;
        }
        if ($switchMp4 != 1) {
            add_header 'Content-Type' 'text/plain charset=UTF-8';
        }

        # allow CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }

        error_page 404 = /staticfile/404.jpg;

        alias /data/cwaiuserdata/web;
    }

    location /data/cwaiuserdata/camera {
        # Disable cache
        add_header Cache-Control no-cache;

        # CORS setup
        add_header 'Access-Control-Allow-Origin' '*' always;
