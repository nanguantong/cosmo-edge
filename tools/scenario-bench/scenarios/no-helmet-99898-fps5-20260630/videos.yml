# MVP 默认模式：设备本地视频循环播放（Camera/AddVideo）。
# 本场景通过 file: 指向本机视频，工具会自动分片上传到设备临时目录再建渠道。
# 循环机制：通过 ApplyParamsBatch 的 taskConfig.params 注入 param.videoRepeatCount=0
# （AlgChannelDemux: video_repeat_count_ <= 0 视为无限循环），使 local 视频持续
# 产生负载，不会读 1 轮就到取流结束。可在 scenario.yml 用 videoRepeatCount 覆盖。
mode: local

local:
  - name: no-helmet-01
    file: LX0000000007.mp4
