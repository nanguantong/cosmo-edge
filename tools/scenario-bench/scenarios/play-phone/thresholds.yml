pass:
  # 实测处理帧率 / 编排设定 fps（AA_00001 = 3）。低于则设备算力跟不上取帧节流。
  minProcessFpsRatio: 0.9
  maxDiscardRate: 0.02
  maxAvgNodeLatencyMs: 80
  maxMemoryGrowthMbPerHour: 100     # phase 2 hook (needs long-run + slope calc)
  maxCrashCount: 0                  # phase 2 hook (needs task lifecycle tracking)
  minEventCount: 1                  # phase 2 hook (needs event stats)

  # 仅 rtsp-fidelity / rtsp-deterministic 生效；local 模式恒为 0
  maxPacketDiscardRate: 0.01
